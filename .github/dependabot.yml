version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-sdk:
        patterns:
          - "github.com/modelcontextprotocol/go-sdk"
          - "github.com/google/jsonschema-go"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
